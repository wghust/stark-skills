<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{REPORT_TITLE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    :root {
      /* 2.1 配色 - 主色、灰、白、强调色 */
      --color-primary: #1e3a5f;
      --color-primary-alt: #2c3e50;
      --color-gray-600: #6b7280;
      --color-gray-400: #9ca3af;
      --color-gray-200: #e5e7eb;
      --color-bg: #ffffff;
      --color-accent: #0ea5e9;
      --color-accent-alt: #3b82f6;

      /* ECharts color palette */
      --chart-color-1: #1e3a5f;
      --chart-color-2: #0ea5e9;
      --chart-color-3: #3b82f6;
      --chart-color-4: #6366f1;
      --chart-color-5: #8b5cf6;
      --chart-color-6: #ec4899;
      --chart-color-7: #f59e0b;
      --chart-color-8: #10b981;

      /* 2.2 字体 */
      --font-title: 'Libre Baskerville', Georgia, 'Times New Roman', serif;
      --font-body: 'Source Sans 3', Inter, system-ui, -apple-system, sans-serif;

      /* 2.3 网格与留白 */
      --space-xs: 0.25rem;
      --space-sm: 0.5rem;
      --space-md: 1rem;
      --space-lg: 1.5rem;
      --space-xl: 2rem;
      --space-2xl: 3rem;
      --space-3xl: 4rem;
      --max-content: 720px;
      --line-subtle: 1px solid var(--color-gray-200);

      /* Shadows */
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.07);
      --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      color: var(--color-primary);
      background: var(--color-bg);
      line-height: 1.6;
      font-size: 16px;
    }

    /* 封面 - 3.1 专业、clean、minimalist */
    .cover {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: var(--space-3xl);
      position: relative;
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-alt) 100%);
      color: var(--color-bg);
    }
    .cover-title { color: var(--color-bg); }
    .cover-subtitle { color: rgba(255, 255, 255, 0.9); }
    .cover-meta {
      font-size: 0.875rem;
      padding-top: var(--space-lg);
    }
    .cover-aspect-16-9 { aspect-ratio: 16/9; min-height: auto; }
    .cover-content { max-width: var(--max-content); position: relative; z-index: 1; }
    .cover-accent {
      position: absolute;
      bottom: var(--space-3xl);
      left: var(--space-3xl);
      width: 80px;
      height: 4px;
      background: var(--color-accent);
      box-shadow: 0 2px 8px rgba(14, 165, 233, 0.4);
    }
    .cover-title {
      font-family: var(--font-title);
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: var(--space-lg);
      line-height: 1.2;
    }
    .cover-subtitle {
      font-family: var(--font-body);
      font-size: 1.125rem;
      margin-bottom: var(--space-2xl);
    }

    /* 正文区块 */
    .content { padding: var(--space-3xl); max-width: var(--max-content); margin: 0 auto; }
    .content h1, .content h2, .content h3 {
      font-family: var(--font-title);
      color: var(--color-primary);
      margin-bottom: var(--space-md);
    }
    .content h1 { font-size: 1.75rem; }
    .content h2 { font-size: 1.375rem; padding-bottom: var(--space-sm); border-bottom: var(--line-subtle); }
    .content p { margin-bottom: var(--space-md); color: var(--color-gray-600); }
    .content section { margin-bottom: var(--space-2xl); }
    .chart-container { height: 280px; margin: var(--space-lg) 0; }

    /* Shadow utilities */
    .shadow-sm { box-shadow: var(--shadow-sm); }
    .shadow-md { box-shadow: var(--shadow-md); }
    .shadow-lg { box-shadow: var(--shadow-lg); }

    /* Background variations */
    .bg-gray-50 { background: #f9fafb; }
    .bg-gray-100 { background: #f3f4f6; }
    .bg-accent-light { background: rgba(14, 165, 233, 0.05); }

    /* Section dividers */
    .section-divider { border-top: 2px solid var(--color-gray-200); margin: var(--space-2xl) 0; padding-top: var(--space-2xl); }

    /* Typography utilities */
    .text-display { font-family: var(--font-title); font-size: 3rem; font-weight: 700; line-height: 1.1; }
    .text-xs { font-size: 0.75rem; }
    .text-sm { font-size: 0.875rem; }
    .text-base { font-size: 1rem; }
    .text-lg { font-size: 1.125rem; }
    .text-xl { font-size: 1.25rem; }
    .text-left { text-align: left; }
    .text-center { text-align: center; }
    .text-right { text-align: right; }
    .font-normal { font-weight: 400; }
    .font-semibold { font-weight: 600; }
    .font-bold { font-weight: 700; }
    .text-primary { color: var(--color-primary); }
    .text-gray { color: var(--color-gray-600); }
    .text-accent { color: var(--color-accent); }

    /* Stat cards */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--space-lg); margin: var(--space-lg) 0; }
    .stat-card { padding: var(--space-lg); background: var(--color-bg); border: 1px solid var(--color-gray-200); border-radius: 8px; }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--color-primary); margin-bottom: var(--space-xs); }
    .stat-label { font-size: 0.875rem; color: var(--color-gray-600); }
    .stat-icon { font-size: 1.5rem; margin-bottom: var(--space-sm); }

    /* Callout boxes */
    .callout { padding: var(--space-lg); border-left: 4px solid; border-radius: 4px; margin: var(--space-lg) 0; }
    .callout-info { background: rgba(14, 165, 233, 0.05); border-color: var(--color-accent); }
    .callout-warning { background: rgba(245, 158, 11, 0.05); border-color: #f59e0b; }
    .callout-success { background: rgba(34, 197, 94, 0.05); border-color: #22c55e; }
    .callout-title { font-weight: 600; margin-bottom: var(--space-sm); display: flex; align-items: center; gap: var(--space-sm); }

    /* Enhanced tables */
    .table-enhanced { width: 100%; border-collapse: collapse; margin: var(--space-lg) 0; }
    .table-enhanced th { background: var(--color-gray-200); padding: var(--space-sm) var(--space-md); text-align: left; font-weight: 600; border-bottom: 2px solid var(--color-gray-400); }
    .table-enhanced td { padding: var(--space-sm) var(--space-md); border-bottom: 1px solid var(--color-gray-200); }
    .table-enhanced tbody tr:nth-child(even) { background: #f9fafb; }

    /* Chart enhancements */
    .chart-wrapper { margin: var(--space-xl) 0; }
    .chart-title { font-family: var(--font-title); font-size: 1.125rem; font-weight: 600; margin-bottom: var(--space-md); color: var(--color-primary); }
    .chart-container { height: 280px; margin: var(--space-md) 0; }
    .chart-description { font-size: 0.875rem; color: var(--color-gray-600); margin-top: var(--space-sm); }

    /* Progress bars */
    .progress-bar { background: var(--color-gray-200); height: 24px; border-radius: 4px; overflow: hidden; margin: var(--space-sm) 0; position: relative; }
    .progress-fill { background: linear-gradient(90deg, var(--color-accent), var(--color-accent-alt)); height: 100%; display: flex; align-items: center; justify-content: flex-end; padding: 0 var(--space-sm); color: white; font-size: 0.75rem; font-weight: 600; }

    /* Comparison blocks */
    .comparison-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-lg); margin: var(--space-lg) 0; }
    .comparison-item { padding: var(--space-lg); border: 2px solid var(--color-gray-200); border-radius: 8px; text-align: center; }
    .comparison-value { font-size: 2.5rem; font-weight: 700; color: var(--color-primary); margin-bottom: var(--space-sm); }
    .comparison-label { font-size: 0.875rem; color: var(--color-gray-600); }

    /* Timeline */
    .timeline { position: relative; padding-left: var(--space-xl); margin: var(--space-xl) 0; }
    .timeline::before { content: ''; position: absolute; left: 8px; top: 0; bottom: 0; width: 2px; background: var(--color-gray-200); }
    .timeline-item { position: relative; margin-bottom: var(--space-lg); }
    .timeline-dot { position: absolute; left: -28px; width: 12px; height: 12px; border-radius: 50%; background: var(--color-accent); border: 3px solid white; box-shadow: 0 0 0 2px var(--color-accent); }
    .timeline-content { padding-left: var(--space-md); }
    .timeline-date { font-size: 0.75rem; font-weight: 600; color: var(--color-accent); margin-bottom: var(--space-xs); }
    .timeline-title { font-weight: 600; margin-bottom: var(--space-xs); }

    /* Badges */
    .badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
    .badge-primary { background: var(--color-primary); color: white; }
    .badge-accent { background: var(--color-accent); color: white; }
    .badge-success { background: #10b981; color: white; }

    @media print {
      .cover { page-break-after: always; min-height: auto; padding: 2cm; }
      .content section { page-break-inside: avoid; }
    }
  </style>
</head>
<body>
  <!-- 3.2 比例：默认 A4 友好，加 cover-aspect-16-9 类为 16:9 -->
  <div class="cover cover-aspect-16-9">
    <div class="cover-content">
      <h1 class="cover-title">{{REPORT_TITLE}}</h1>
      <p class="cover-subtitle">{{REPORT_SUBTITLE}}</p>
      <div class="cover-meta">{{REPORT_META}}</div>
    </div>
    <div class="cover-accent"></div>
  </div>

  <div class="content">
    {{REPORT_BODY}}
    {{CHARTS_SECTION}}
  </div>
  <script>
    // ECharts base configuration
    const echartsColors = ['#1e3a5f', '#0ea5e9', '#3b82f6', '#6366f1', '#8b5cf6', '#ec4899', '#f59e0b', '#10b981'];
    const echartsBaseConfig = {
      animation: false,
      textStyle: { fontFamily: 'Source Sans 3, Inter, sans-serif' },
      color: echartsColors
    };
  </script>
</body>
</html>
